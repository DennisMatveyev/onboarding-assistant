<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Onboarding Assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background-color: #f8f9fa; }
    #chatLog {
      height: 480px;
      overflow-y: auto;
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 0.375rem;
      padding: 1rem;
    }
    .msg { margin-bottom: 0.75rem; }
    .msg-you .bubble {
      background-color: #0d6efd;
      color: #fff;
      border-radius: 1rem 1rem 0.2rem 1rem;
    }
    .msg-server .bubble {
      background-color: #e9ecef;
      color: #212529;
      border-radius: 1rem 1rem 1rem 0.2rem;
    }
    .msg-system .bubble {
      background-color: transparent;
      color: #6c757d;
      font-size: 0.8rem;
    }
    .bubble { display: inline-block; padding: 0.5rem 0.85rem; max-width: 80%; white-space: pre-wrap; word-break: break-word; }
    .msg-you { text-align: right; }
    .label { font-size: 0.7rem; color: #6c757d; margin-bottom: 0.15rem; }
  </style>
</head>
<body>
  <div class="container py-5" style="max-width: 720px;">
    <div class="mb-4">
      <h4 class="fw-semibold mb-0">Onboarding Assistant</h4>
      <small class="text-muted">Ask questions about company processes and documents</small>
    </div>

    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <div class="row g-2 align-items-center">
          <div class="col">
            <input id="userId" class="form-control" placeholder="User ID" value="1" />
          </div>
          <div class="col-auto">
            <button id="connectBtn" class="btn btn-primary" onclick="connect()">Connect</button>
          </div>
        </div>
      </div>
    </div>

    <div id="chatLog" class="mb-3"></div>

    <div class="input-group">
      <input id="messageInput" class="form-control" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()" disabled />
      <button class="btn btn-primary" onclick="sendMessage()" id="sendBtn" disabled>Send</button>
    </div>
  </div>

  <script>
    let ws;

    function connect() {
      const userId = document.getElementById('userId').value.trim();
      if (!userId) return;

      if (ws) ws.close();

      ws = new WebSocket(`ws://127.0.0.1:8000/chat/${userId}`);

      ws.onopen = () => {
        logSystem('Connected as "' + userId + '"');
        document.getElementById('connectBtn').textContent = 'Reconnect';
        document.getElementById('messageInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('messageInput').focus();
      };

      ws.onmessage = (event) => logServer(event.data);

      ws.onclose = () => {
        logSystem('Disconnected');
        document.getElementById('messageInput').disabled = true;
        document.getElementById('sendBtn').disabled = true;
      };

      ws.onerror = () => logSystem('Connection error');
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(text);
      logYou(text);
      input.value = '';
    }

    function logYou(text) {
      appendMessage('You', text, 'msg-you');
    }

    function logServer(text) {
      appendMessage('Assistant', text, 'msg-server');
    }

    function logSystem(text) {
      appendMessage(null, text, 'msg-system');
    }

    function appendMessage(label, text, cls) {
      const log = document.getElementById('chatLog');
      const wrapper = document.createElement('div');
      wrapper.className = 'msg ' + cls;
      if (label) {
        const l = document.createElement('div');
        l.className = 'label';
        l.textContent = label;
        wrapper.appendChild(l);
      }
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      wrapper.appendChild(bubble);
      log.appendChild(wrapper);
      log.scrollTop = log.scrollHeight;
    }
  </script>
</body>
</html>
